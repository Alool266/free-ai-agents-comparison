name: Auto-Scrape AI Agents Data

on:
  schedule:
    - cron: '* * * * *'  # Every minute
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r scraper/requirements.txt

    - name: Run scraper
      run: |
        cd scraper
        python scraper.py

    - name: Check for changes
      id: check
      run: |
        if git diff --quiet data/agents.json; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Create Pull Request
      if: steps.check.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Auto-update: Scraped latest AI agents data"
        title: "🔄 Auto-update AI agents data"
        body: |
          This PR was automatically generated by the scraper workflow.
          
          The scraper has discovered new AI agents or updated existing data.
          
          **Changes:**
          - Updated `data/agents.json` with latest information
          - Added new free AI models if discovered
          
          This PR will be merged automatically after review.
        branch: "auto-update-ai-agents"
        base: main
        delete-branch: true
        labels: automated, data-update
