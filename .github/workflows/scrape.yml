name: Auto-Scrape AI Agents Data

on:
  schedule:
    - cron: '* * * * *'  # Every minute
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r scraper/requirements.txt

    - name: Run scraper
      run: |
        cd scraper
        python scraper.py

    - name: Check for changes
      id: check
      run: |
        if git diff --quiet data/agents.json; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit and push changes
      if: steps.check.outputs.changed == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/agents.json
        git commit -m "Auto-update: Scraped latest AI agents data [skip ci]"
        git push origin main

    - name: Trigger Pages rebuild
      if: steps.check.outputs.changed == 'true'
      run: |
        echo "Data updated successfully! GitHub Pages will rebuild automatically."
